<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO -->
  <title>SafeLaunch — Trusted PWA App Store | AI-Verified Web Apps</title>
  <meta name="description" content="SafeLaunch is the trusted PWA app store with AI-powered safety scanning. Browse, publish, and install verified progressive web apps with confidence." />
  <meta name="keywords" content="PWA, app store, progressive web app, web app store, AI verified, safety scanning, install PWA, publish app" />
  <meta name="author" content="SafeLaunch" />
  <link rel="canonical" href="https://agentslock.com/" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://agentslock.com/" />
  <meta property="og:title" content="SafeLaunch — Trusted PWA App Store" />
  <meta property="og:description" content="The trusted PWA app store with AI-powered safety scanning. Browse, publish, and install verified web apps." />
  <meta property="og:image" content="https://agentslock.com/icons/og-image.png" />
  <meta property="og:site_name" content="SafeLaunch" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://agentslock.com/" />
  <meta name="twitter:title" content="SafeLaunch — Trusted PWA App Store" />
  <meta name="twitter:description" content="The trusted PWA app store with AI-powered safety scanning." />
  <meta name="twitter:image" content="https://agentslock.com/icons/og-image.png" />

  <!-- PWA -->
  <meta name="theme-color" content="#00e5a0" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SafeLaunch" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "SafeLaunch",
    "url": "https://agentslock.com",
    "description": "The trusted PWA app store with AI-powered safety scanning. Browse, publish, and install verified progressive web apps.",
    "applicationCategory": "UtilitiesApplication",
    "operatingSystem": "Web, iOS, Android, macOS, Windows",
    "offers": {
      "@type": "AggregateOffer",
      "lowPrice": "9",
      "highPrice": "99",
      "priceCurrency": "USD",
      "offerCount": "3"
    },
    "creator": {
      "@type": "Organization",
      "name": "SafeLaunch",
      "url": "https://agentslock.com"
    }
  }
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>

  <!-- Inline loading indicator — visible until React mounts -->
  <div id="boot-loader" style="
    position: fixed; inset: 0; z-index: 99999;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #0a0a0f; color: #e8e8f0;
    font-family: 'Syne', system-ui, sans-serif;
    transition: opacity .3s;
  ">
    <div style="
      width: 36px; height: 36px; border: 3px solid #2a2a3a;
      border-top-color: #00e5a0; border-radius: 50%;
      animation: bl-spin .8s linear infinite;
    "></div>
    <p style="margin-top: 18px; font-size: .9rem; color: #7070a0;">Loading SafeLaunch...</p>
    <style>@keyframes bl-spin{to{transform:rotate(360deg)}}</style>
  </div>

  <!-- Recovery: if React hasn't mounted after 12s, show actionable error -->
  <script>
    (function(){
      var t = setTimeout(function(){
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
          var loader = document.getElementById('boot-loader');
          if (loader) loader.innerHTML =
            '<div style="text-align:center;padding:40px;max-width:480px">' +
            '<h1 style="font-size:1.3rem;margin-bottom:12px">SafeLaunch failed to load</h1>' +
            '<p style="color:#7070a0;margin-bottom:20px;line-height:1.6">' +
            'This may be caused by a stale cache or network issue. Try the steps below:</p>' +
            '<button onclick="caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})})' +
            '.then(function(){navigator.serviceWorker&&navigator.serviceWorker.getRegistrations()' +
            '.then(function(r){r.forEach(function(sw){sw.unregister()})})})' +
            '.then(function(){location.reload()})" style="' +
            'background:#00e5a0;color:#0a0a0f;border:none;border-radius:8px;' +
            'padding:12px 28px;font-weight:700;cursor:pointer;font-size:.9rem;margin-bottom:12px">' +
            'Clear Cache &amp; Reload</button>' +
            '<p style="color:#7070a0;font-size:.8rem">Or try: hard-refresh (Ctrl+Shift+R) or open in incognito.</p>' +
            '</div>';
        }
      }, 12000);
      window.__bootTimer = t;
    })();
  </script>

  <noscript>
    <div style="
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0f; color: #e8e8f0;
      font-family: system-ui, sans-serif; text-align: center; padding: 40px;
    ">
      <div>
        <h1 style="font-size: 1.3rem; margin-bottom: 12px;">JavaScript Required</h1>
        <p style="color: #7070a0;">SafeLaunch requires JavaScript to run. Please enable it in your browser settings.</p>
      </div>
    </div>
  </noscript>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
